<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dairy Queen Customer Feedback</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f4f6f9;
margin:0;
padding:20px;
}

.container{
max-width:650px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.1);
}

h1{
text-align:center;
color:#d71920;
}

.subtitle{
text-align:center;
margin-bottom:20px;
}

.progress-bar{
width:100%;
background:#ddd;
border-radius:20px;
margin-bottom:25px;
}

.progress{
height:10px;
width:0%;
background:#d71920;
border-radius:20px;
transition:0.3s;
}

.question{
margin-bottom:20px;
}

.star-rating{
display:flex;
gap:8px;
font-size:28px;
cursor:pointer;
}

.star{
color:#ccc;
}

.star.active{
color:#f5b301;
}

textarea{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

select{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:14px;
background:#d71920;
color:white;
border:none;
border-radius:6px;
font-size:16px;
margin-top:20px;
cursor:pointer;
}

button:hover{
background:#b9151a;
}

.thankyou{
display:none;
text-align:center;
padding:40px;
}

</style>

</head>

<body>

<div class="container">

<h1>Dairy Queen Feedback</h1>
<p class="subtitle">Rate your experience and receive a <b>FREE Ice Cream Cone</b></p>

<div class="progress-bar">
<div class="progress" id="progress"></div>
</div>

<form id="feedbackForm">

<div class="question">
<label>1. How satisfied are you with the overall quality of the product?</label>
<div class="star-rating" data-name="q1"></div>
</div>

<div class="question">
<label>2. How satisfied are you with the taste of the food or dessert?</label>
<div class="star-rating" data-name="q2"></div>
</div>

<div class="question">
<label>3. How satisfied are you with the variety of menu items?</label>
<div class="star-rating" data-name="q3"></div>
</div>

<div class="question">
<label>4. How satisfied are you with the speed of service?</label>
<div class="star-rating" data-name="q4"></div>
</div>

<div class="question">
<label>5. How satisfied are you with the friendliness of the staff?</label>
<div class="star-rating" data-name="q5"></div>
</div>

<div class="question">
<label>6. How satisfied are you with the accuracy of your order?</label>
<div class="star-rating" data-name="q6"></div>
</div>

<div class="question">
<label>7. How satisfied are you with the cleanliness of the store?</label>
<div class="star-rating" data-name="q7"></div>
</div>

<div class="question">
<label>8. How satisfied are you with the overall ambiance of the store?</label>
<div class="star-rating" data-name="q8"></div>
</div>

<div class="question">
<label>9. How satisfied are you with the value for money?</label>
<div class="star-rating" data-name="q9"></div>
</div>

<div class="question">
<label>10. How satisfied are you with your overall experience at Dairy Queen?</label>
<div class="star-rating" data-name="q10"></div>
</div>

<label>Would you recommend Dairy Queen?</label>
<select name="recommend">
<option value="Yes">Yes</option>
<option value="No">No</option>
</select>

<label>Additional Comments</label>
<textarea name="comments"></textarea>

<button type="submit">Submit Feedback</button>

</form>

<div class="thankyou" id="thankyou">

<h2>Thank You!</h2>
<p>Your feedback helps us improve.</p>
<p>Please claim your <b>FREE Ice Cream Cone</b> at the counter.</p>

</div>

</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbwXE2wRgtiglQTPAs0DXnEsr-5ywN5Dhrg39GgO-ce96vbLTqL0EadcO6l73i-dC-979Q/exec";

let answers={};

function createStars(){

document.querySelectorAll(".star-rating").forEach(container=>{

let name=container.dataset.name;

for(let i=1;i<=5;i++){

let star=document.createElement("span");
star.innerHTML="★";
star.classList.add("star");

star.onclick=()=>{

answers[name]=i;

container.querySelectorAll(".star").forEach((s,index)=>{
s.classList.toggle("active",index<i);
});

updateProgress();

};

container.appendChild(star);

}

});

}

createStars();

function updateProgress(){

let total=10;

let answered=Object.keys(answers).length;

let percent=(answered/total)*100;

document.getElementById("progress").style.width=percent+"%";

}

document.getElementById("feedbackForm").addEventListener("submit",function(e){

e.preventDefault();

if(Object.keys(answers).length<10){

alert("Please answer all questions");

return;

}

let formData=new FormData();

for(let key in answers){

formData.append(key,answers[key]);

}

formData.append("recommend",document.querySelector("[name=recommend]").value);

formData.append("comments",document.querySelector("[name=comments]").value);

fetch(SCRIPT_URL,{
method:"POST",
body:formData
})
.then(res=>res.json())
.then(()=>{

document.getElementById("feedbackForm").style.display="none";
document.getElementById("thankyou").style.display="block";

});

});

</script>

</body>
</html>
