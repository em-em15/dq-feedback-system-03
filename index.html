<!-- index.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dairy Queen Feedback</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f4f4;padding:20px;}
.container{max-width:650px;margin:auto;background:white;padding:25px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
h2{text-align:center;color:#d71920;}
label{display:block;margin-top:18px;font-weight:bold;}
.star-rating{display:flex;gap:6px;font-size:28px;cursor:pointer;margin-top:5px;}
.star{color:#ccc;}
.star.active{color:#f5b301;}
textarea,select{width:100%;padding:10px;margin-top:5px;border-radius:5px;border:1px solid #ccc;}
button{margin-top:20px;width:100%;padding:14px;background:#d71920;color:white;border:none;border-radius:6px;font-size:16px;cursor:pointer;}
button:hover{background:#b51518;}
.thankyou{display:none;text-align:center;padding:40px;}
</style>
</head>
<body>

<div class="container">
<h2>Dairy Queen Feedback</h2>
<p style="text-align:center;">Rate your experience and receive a <b>FREE Ice Cream Cone</b>!</p>

<form id="feedbackForm">
<!-- Repeat this block for Q1-Q10 -->
<div class="question">
<label>1. How satisfied are you with the overall quality of the product you purchased?</label>
<div class="star-rating" data-name="q1"></div>
</div>
<div class="question">
<label>2. How satisfied are you with the taste of the food or dessert?</label>
<div class="star-rating" data-name="q2"></div>
</div>
<div class="question">
<label>3. How satisfied are you with the variety of menu items?</label>
<div class="star-rating" data-name="q3"></div>
</div>
<div class="question">
<label>4. How satisfied are you with the speed of service?</label>
<div class="star-rating" data-name="q4"></div>
</div>
<div class="question">
<label>5. How satisfied are you with the friendliness of the staff?</label>
<div class="star-rating" data-name="q5"></div>
</div>
<div class="question">
<label>6. How satisfied are you with the accuracy of your order?</label>
<div class="star-rating" data-name="q6"></div>
</div>
<div class="question">
<label>7. How satisfied are you with the cleanliness of the store?</label>
<div class="star-rating" data-name="q7"></div>
</div>
<div class="question">
<label>8. How satisfied are you with the store’s ambiance and comfort?</label>
<div class="star-rating" data-name="q8"></div>
</div>
<div class="question">
<label>9. How satisfied are you with the value for money of the product?</label>
<div class="star-rating" data-name="q9"></div>
</div>
<div class="question">
<label>10. How satisfied are you with your overall experience at Dairy Queen today?</label>
<div class="star-rating" data-name="q10"></div>
</div>

<label>Would you recommend Dairy Queen?</label>
<select name="recommend">
<option value="Yes">Yes</option>
<option value="No">No</option>
</select>

<label>Additional Comments</label>
<textarea name="comments" rows="4"></textarea>

<button type="submit">Submit Feedback</button>
</form>

<div class="thankyou" id="thankyou">
<h2>Thank You!</h2>
<p>Your feedback helps us improve.</p>
<p>Please claim your <b>FREE Ice Cream Cone</b> at the counter.</p>
</div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw3199RxnqXNqe9-nuJpDQqqk0F4WBC9-lJ62dRu2FwyWybek4MnWMNvQGFtfmzsw9Mtg/exec"; // Replace with Apps Script Web App URL
let answers = {};

document.querySelectorAll(".star-rating").forEach(container=>{
  let name = container.dataset.name;
  for(let i=1;i<=5;i++){
    let star=document.createElement("span");
    star.innerHTML="★";
    star.classList.add("star");
    star.addEventListener("click", ()=>{
      answers[name]=i;
      container.querySelectorAll(".star").forEach((s,index)=>s.classList.toggle("active",index<i));
    });
    container.appendChild(star);
  }
});

document.getElementById("feedbackForm").addEventListener("submit", function(e){
  e.preventDefault();
  if(Object.keys(answers).length<10){ alert("Please answer all 10 questions."); return; }

  let formData = new FormData(this);
  for(let key in answers){ formData.append(key, answers[key]); }

  let obj = {};
  formData.forEach((value,key)=>obj[key]=value);

  fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify(obj)})
  .then(res=>res.json())
  .then(data=>{
    document.getElementById("feedbackForm").style.display="none";
    document.getElementById("thankyou").style.display="block";
  });
});
</script>
</body>
</html>
