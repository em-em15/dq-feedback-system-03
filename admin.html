<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dairy Queen Admin Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {font-family:Arial,sans-serif;background:#f4f4f4;margin:0;padding:20px;}
.container {max-width:1300px;margin:auto;background:white;padding:20px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
h2{text-align:center;color:#d71920;margin-bottom:10px;}
.stats {text-align:center;margin-bottom:20px;font-size:16px;font-weight:bold;}
.charts-grid {display:flex; flex-wrap:wrap; justify-content:space-between; gap:20px;}
.chart-box {width:32%; background:white; padding:10px; border-radius:6px; box-shadow:0 0 5px rgba(0,0,0,0.1);}
.chart-box canvas{width:100% !important; height:200px !important;}
.table-container {margin-top:40px; overflow-x:auto;}
table {width:100%;border-collapse:collapse;}
th,td {padding:8px 12px;border:1px solid #ccc;text-align:center;font-size:14px;}
th {background:#d71920;color:white;}
tr:nth-child(even){background:#f9f9f9;}
.highlight{background:#ffeeba;}
</style>
</head>
<body>

<div class="container">
<h2>Dairy Queen Feedback Admin Dashboard</h2>
<div class="stats" id="totalCount">Total Submissions: 0</div>

<div class="charts-grid">
  <div class="chart-box">
    <canvas id="miniBarChart"></canvas>
  </div>
  <div class="chart-box">
    <canvas id="avgChart"></canvas>
  </div>
</div>

<div class="table-container">
<h3>All Feedback Data</h3>
<table id="dataTable">
<thead>
<tr>
<th>Timestamp</th>
<th>Q1_ProductQuality</th>
<th>Q2_Taste</th>
<th>Q3_MenuVariety</th>
<th>Q4_ServiceSpeed</th>
<th>Q5_StaffFriendliness</th>
<th>Q6_OrderAccuracy</th>
<th>Q7_Cleanliness</th>
<th>Q8_StoreAmbience</th>
<th>Q9_ValueForMoney</th>
<th>Q10_OverallExperience</th>
<th>Recommend</th>
<th>Comments</th>
<th>Average_Rating</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>
</div>

<script>
// Replace with your deployed Apps Script doGet URL
const SHEET_URL = "https://script.google.com/macros/s/AKfycbzvLTK-sW_QKzQXv8F2BYlBxJA3FFUvBof6A_EzmoA6RLkP7fxYitUJqbu6B_62zsReCA/exec";

let feedbackData = [];
let previousDataLength = 0;

// Fetch feedback data
async function fetchFeedbackData(){
  try {
    const res = await fetch(SHEET_URL);
    const data = await res.json();
    // Sort newest first
    data.sort((a,b)=>new Date(b.Timestamp)-new Date(a.Timestamp));
    feedbackData = data;
    renderDashboard();
  } catch(err){
    console.error("Error fetching data:", err);
  }
}

// Calculate averages
function calculateAverages(data){
  const keys = ['Q1_ProductQuality','Q2_Taste','Q3_MenuVariety','Q4_ServiceSpeed','Q5_StaffFriendliness','Q6_OrderAccuracy','Q7_Cleanliness','Q8_StoreAmbience','Q9_ValueForMoney','Q10_OverallExperience'];
  return keys.map(key=>{
    let sum=0,count=0;
    data.forEach(r=>{
      const val = Number(r[key]);
      if(!isNaN(val)){sum+=val;count++;}
    });
    return count? (sum/count).toFixed(2):0;
  });
}

// Render charts
function renderCharts(data){
  const averages = calculateAverages(data);
  const labels = ["Q1 Product","Q2 Taste","Q3 Menu","Q4 Service","Q5 Staff","Q6 Order","Q7 Clean","Q8 Ambience","Q9 Value","Q10 Overall"];

  // Mini bar chart
  const ctxMini = document.getElementById("miniBarChart").getContext("2d");
  if(window.miniChart) window.miniChart.destroy();
  window.miniChart = new Chart(ctxMini,{
    type:'bar',
    data:{labels, datasets:[{label:"Average Rating",data:averages,backgroundColor:'#d71920'}]},
    options:{indexAxis:'y', scales:{x:{min:0,max:5}}}
  });

  // Overall average doughnut chart
  const overallAvg = (averages.reduce((a,b)=>a+Number(b),0)/averages.length).toFixed(2);
  const ctxAvg = document.getElementById("avgChart").getContext("2d");
  if(window.avgChart) window.avgChart.destroy();
  window.avgChart = new Chart(ctxAvg,{
    type:'doughnut',
    data:{labels:["Average Rating"],datasets:[{data:[overallAvg,5-overallAvg],backgroundColor:['#d71920','#eee']}]},
    options:{plugins:{tooltip:{enabled:true}}}
  });
}

// Render table
function renderTable(data){
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML="";
  data.forEach((row,index)=>{
    const tr = document.createElement("tr");
    if(index >= previousDataLength) tr.classList.add("highlight");
    tr.innerHTML = `
      <td>${row.Timestamp}</td>
      <td>${row.Q1_ProductQuality}</td>
      <td>${row.Q2_Taste}</td>
      <td>${row.Q3_MenuVariety}</td>
      <td>${row.Q4_ServiceSpeed}</td>
      <td>${row.Q5_StaffFriendliness}</td>
      <td>${row.Q6_OrderAccuracy}</td>
      <td>${row.Q7_Cleanliness}</td>
      <td>${row.Q8_StoreAmbience}</td>
      <td>${row.Q9_ValueForMoney}</td>
      <td>${row.Q10_OverallExperience}</td>
      <td>${row.Recommend}</td>
      <td>${row.Comments}</td>
      <td>${row.Average_Rating}</td>
    `;
    tbody.appendChild(tr);
  });
  previousDataLength = data.length;
  document.getElementById("totalCount").innerText = Total Submissions: ${data.length};
}

// Render dashboard
function renderDashboard(){
  renderCharts(feedbackData);
  renderTable(feedbackData);
}

// Initial load
fetchFeedbackData();

// Auto-refresh every 15 sec
setInterval(fetchFeedbackData,15000);
</script>
</body>
</html>
