<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dairy Queen Feedback Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:Arial;background:#f6f6f6;margin:0;padding:20px;text-align:center;}
h1{color:#d71920;}
.dashboard{max-width:1000px;margin:auto;background:white;padding:20px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
.metrics{display:flex;justify-content:space-around;margin-bottom:20px;}
.card{background:#0057a4;color:white;padding:15px;border-radius:8px;width:220px;}
canvas{background:white;padding:10px;border-radius:8px;box-shadow:0 0 5px rgba(0,0,0,0.1);}
table{width:100%;margin-top:20px;border-collapse:collapse;}
th,td{padding:8px;border:1px solid #ddd;font-size:13px;}
th{background:#d71920;color:white;}
tr:nth-child(even){background:#f9f9f9;}
.comments{text-align:left;white-space:pre-wrap;}
.highlight{background:#fff3a6;animation:fade 2s forwards;}
tr:hover{background:#ffeaa6;cursor:pointer;}
@keyframes fade{from{background:#fff3a6;}to{background:white;}}
</style>
</head>
<body>

<div class="dashboard">
<h1>Dairy Queen Feedback Dashboard</h1>

<div class="metrics">
  <div class="card">
    <h3>Overall All-Day Rating</h3>
    <canvas id="overallChart" width="200" height="200"></canvas>
    <span id="avgRatingText" style="display:block;margin-top:5px;font-size:18px;">0 ⭐</span>
  </div>
  <div class="card">
    <h3>Total Submissions</h3>
    <span id="totalSubmissions" style="font-size:24px;">0</span>
  </div>
</div>

<h3>Customer Comments</h3>
<table id="feedbackTable">
<thead>
<tr>
<th>Comments</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzvLTK-sW_QKzQXv8F2BYlBxJA3FFUvBof6A_EzmoA6RLkP7fxYitUJqbu6B_62zsReCA/exec"; // Replace with your Apps Script URL
let previousIDs = new Set();

async function fetchData(){
  const res = await fetch(API_URL);
  const data = await res.json();
  return data.map(r=>({
    Timestamp: r.Timestamp || "",
    Comments: r.Comments || "",
    Average: Number(r.Average_Rating)||0
  }));
}

function renderMetrics(data){
  document.getElementById("totalSubmissions").innerText = data.length;
  const avg = data.length ? (data.reduce((s,d)=>s+d.Average,0)/data.length).toFixed(2) : 0;
  document.getElementById("avgRatingText").innerText = avg + " ⭐";

  const remaining = (5 - avg).toFixed(2);
  const ctx = document.getElementById("overallChart").getContext("2d");
  if(window.overallChart) window.overallChart.destroy();

  const gradient = ctx.createLinearGradient(0,0,200,200);
  gradient.addColorStop(0, '#ff4d4d');
  gradient.addColorStop(1, '#b30000');

  window.overallChart = new Chart(ctx,{
    type:'doughnut',
    data:{
      labels:["Average Rating","Remaining"],
      datasets:[{
        data:[avg,remaining],
        backgroundColor:[gradient,'#e0e0e0'],
        borderWidth:1
      }]
    },
    options:{
      cutout:'60%',
      rotation:-90,
      circumference:360,
      plugins:{legend:{display:false}},
      animation:{animateRotate:true,animateScale:true}
    }
  });
}

function renderTable(data){
  const tbody = document.querySelector("#feedbackTable tbody");
  tbody.innerHTML="";
  data.sort((a,b)=>new Date(b.Timestamp)-new Date(a.Timestamp));
  let newIDs = new Set();
  data.forEach(d=>{
    const tr = document.createElement("tr");
    if(!previousIDs.has(d.Timestamp)) tr.classList.add("highlight");
    tr.title = d.Comments; // Show full comment on hover
    tr.innerHTML=`<td class="comments">${d.Comments}</td>`;
    tbody.appendChild(tr);
    newIDs.add(d.Timestamp);
  });
  previousIDs = newIDs;
}

async function updateDashboard(){
  const data = await fetchData();
  renderMetrics(data);
  renderTable(data);
}

// Initial load
updateDashboard();
setInterval(updateDashboard,10000);
</script>

</body>
</html>
