<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dairy Queen Feedback Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:Arial;background:#f6f6f6;margin:0;padding:20px;text-align:center;}
h1{color:#d71920;}
.dashboard{max-width:1000px;margin:auto;background:white;padding:20px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
.metrics{display:flex;justify-content:space-around;margin-bottom:20px;}
.card{background:#0057a4;color:white;padding:15px;border-radius:8px;width:200px;}
canvas{background:white;padding:10px;border-radius:8px;box-shadow:0 0 5px rgba(0,0,0,0.1);}
table{width:100%;margin-top:20px;border-collapse:collapse;}
th,td{padding:8px;border:1px solid #ddd;font-size:13px;}
th{background:#d71920;color:white;}
tr:nth-child(even){background:#f9f9f9;}
.comments{text-align:left;white-space:pre-wrap;}
</style>
</head>
<body>

<div class="dashboard">
<h1>Dairy Queen Feedback Dashboard</h1>

<div class="metrics">
  <div class="card">
    <h3>Overall All-Day Rating</h3>
    <span id="allDayRating">0</span> ⭐
  </div>
  <div class="card">
    <h3>Total Submissions</h3>
    <span id="totalSubmissions">0</span>
  </div>
</div>

<canvas id="avgChart" width="800" height="200"></canvas>

<h3>Feedback Table</h3>
<table id="feedbackTable">
<thead>
<tr>
<th>Timestamp</th>
<th>Comments</th>
<th>Average Rating</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>
const API_URL = "YOUR_DOGET_WEBAPP_URL"; // replace with your Apps Script URL

async function fetchData(){
  const res = await fetch(API_URL);
  const data = await res.json();
  return data.map(r => ({
    Timestamp: r.Timestamp || "",
    Comments: r.Comments || "",
    Average: Number(r.Average_Rating) || 0,
    Q: [
      Number(r.Q1_ProductQuality)||0,
      Number(r.Q2_Taste)||0,
      Number(r.Q3_MenuVariety)||0,
      Number(r.Q4_ServiceSpeed)||0,
      Number(r.Q5_StaffFriendliness)||0,
      Number(r.Q6_OrderAccuracy)||0,
      Number(r.Q7_Cleanliness)||0,
      Number(r.Q8_StoreAmbience)||0,
      Number(r.Q9_ValueForMoney)||0,
      Number(r.Q10_OverallExperience)||0
    ]
  }));
}

function renderMetrics(data){
  const total = data.length;
  document.getElementById("totalSubmissions").innerText = total;

  const overallAvg = total? (data.reduce((sum,d)=>sum+d.Average,0)/total).toFixed(2) : 0;
  document.getElementById("allDayRating").innerText = overallAvg;
}

function renderAvgChart(data){
  const questionAvg = [];
  for(let i=0;i<10;i++){
    const valid = data.map(d=>d.Q[i]).filter(v=>v>0);
    const avg = valid.length? (valid.reduce((a,b)=>a+b,0)/valid.length).toFixed(2):0;
    questionAvg.push(avg);
  }

  const ctx = document.getElementById("avgChart").getContext("2d");
  if(window.avgChart) window.avgChart.destroy();
  window.avgChart = new Chart(ctx,{
    type:'bar',
    data:{
      labels:["Q1","Q2","Q3","Q4","Q5","Q6","Q7","Q8","Q9","Q10"],
      datasets:[{label:"Average Rating per Question",data:questionAvg,backgroundColor:"#d71920"}]
    },
    options:{scales:{y:{min:0,max:5}}}
  });
}

function renderTable(data){
  const tbody=document.querySelector("#feedbackTable tbody");
  tbody.innerHTML="";
  data.sort((a,b)=>new Date(b.Timestamp)-new Date(a.Timestamp));
  data.forEach(d=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`<td>${d.Timestamp}</td><td class="comments">${d.Comments}</td><td>${d.Average.toFixed(2)}</td>`;
    tbody.appendChild(tr);
  });
}

async function updateDashboard(){
  const data = await fetchData();
  renderMetrics(data);
  renderAvgChart(data);
  renderTable(data);
}

// Initial load
updateDashboard();

// Refresh every 10 seconds
setInterval(updateDashboard,10000);
</script>
</body>
</html>
